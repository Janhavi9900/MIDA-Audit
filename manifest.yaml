manifestVersion: 1
info:
  name: "MIDA Audit Engine"
  description: "AI-powered lab deviation audit — assigns VERIFIED, JUSTIFIED or FAIL status to samples based on SOP documents."
  version: "1.1.0"

features:
  - name: "MIDA Audit"
    id: "mida_audit_canvas"
    type: "CANVAS"
    locations:
      - ENTRY

subscriptions:
  deliveryMethod: WEBHOOK
  messages:
    - type: v2.canvas.userInteracted
    - type: v2.canvas.created